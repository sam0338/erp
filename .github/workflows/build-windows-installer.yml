name: Build Windows Installer

# Produces SakaarERPSetup.exe on a real Windows runner, since the native
# better-sqlite3 module and the NSIS compiler both need to build/run on
# Windows (see packaging/BUILD_INSTRUCTIONS.md for the manual equivalent
# of every step below).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "20.18.1"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download portable Node runtime to bundle
        shell: pwsh
        run: |
          $ver = "${{ env.NODE_VERSION }}"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v$ver/node-v$ver-win-x64.zip" -OutFile node.zip
          Expand-Archive node.zip -DestinationPath packaging
          Move-Item "packaging/node-v$ver-win-x64" "packaging/node"

      - name: Stage client app folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packaging/app | Out-Null
          $exclude = @('node_modules', 'packaging', '.git', '.github', 'docs')
          Get-ChildItem -Path . -Force |
            Where-Object { $exclude -notcontains $_.Name } |
            Copy-Item -Destination packaging/app -Recurse -Force
          # Never ship the license generator (or its LICENSE_SECRET) to a client.
          Remove-Item packaging/app/generate-license.js -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path packaging/app/backend/db | Out-Null

      - name: npm install (production, built natively on Windows)
        working-directory: packaging/app
        run: npm install --production --no-audit --no-fund

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Compile installer
        working-directory: packaging
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SakaarERPSetup
          path: packaging/SakaarERPSetup.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/SakaarERPSetup.exe
